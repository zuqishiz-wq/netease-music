name: Build APK

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with: { node-version: '20' }

      - uses: actions/setup-java@v4
        with: { distribution: 'temurin', java-version: '17' }

      - name: Setup Android SDK
        run: |
          mkdir -p $HOME/android-sdk/cmdline-tools
          cd $HOME/android-sdk/cmdline-tools
          curl -sLO https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip -q commandlinetools-linux-11076708_latest.zip
          mv cmdline-tools latest
          yes | $HOME/android-sdk/cmdline-tools/latest/bin/sdkmanager --licenses
          $HOME/android-sdk/cmdline-tools/latest/bin/sdkmanager "platforms;android-34" "build-tools;34.0.0"
        env:
          ANDROID_SDK_ROOT: ${{ runner.temp }}/android-sdk

      - name: Install bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Init and build TWA
        run: |
          bubblewrap init --manifest twa-manifest.json --directory twa-project
          cd twa-project
          bubblewrap build
        env:
          ANDROID_HOME: ${{ runner.temp }}/android-sdk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: cloudmusic-apk
          path: twa-project/app/build/outputs/apk/release/*.apk
