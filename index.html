<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#1a1a2e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <title>CloudMusic</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="app">
  <!-- 顶部导航 -->
  <header class="header">
    <h1 class="title">CloudMusic</h1>
    <nav class="tabs">
      <button class="tab active" data-tab="search">🔍 搜索</button>
      <button class="tab" data-tab="local">💿 本地</button>
      <button class="tab" data-tab="playlist">📁 歌单</button>
    </nav>
  </header>

  <!-- 搜索页 -->
  <main id="tab-search" class="tab-content active">
    <div class="search-box">
      <input type="text" id="search-input" placeholder="搜索歌曲、歌手..." autocomplete="off">
      <button id="search-btn">搜索</button>
    </div>
    <div id="search-results" class="song-list"></div>
    <div id="search-empty" class="empty-hint">输入关键词搜索歌曲</div>
  </main>

  <!-- 本地音乐页 -->
  <main id="tab-local" class="tab-content">
    <div class="search-box">
      <input type="text" id="local-search-input" placeholder="搜索本地歌曲..." autocomplete="off">
      <button id="local-search-btn">搜索</button>
    </div>
    <div id="local-results" class="song-list"></div>
    <div id="local-empty" class="empty-hint">本地音乐（共 <span id="local-count">0</span> 首），连接 WiFi 加载</div>
  </main>

  <!-- 歌单页 -->
  <main id="tab-playlist" class="tab-content">
    <div class="playlist-header">
      <button id="new-playlist-btn">+ 新建歌单</button>
    </div>
    <div id="playlist-list" class="playlist-grid"></div>
    <div id="playlist-songs" class="song-list" style="display:none"></div>
    <button id="playlist-back" class="back-btn" style="display:none">← 返回歌单列表</button>
  </main>

  <!-- 播放器展开页 -->
  <div id="player-full" class="player-full hidden">
    <div class="player-full-bg"></div>
    <button id="player-collapse" class="collapse-btn">▼</button>
    <div class="player-full-content">
      <img id="player-cover-large" class="cover-large" src="" alt="">
      <h2 id="player-title-large" class="title-large"></h2>
      <p id="player-artist-large" class="artist-large"></p>
      <div class="progress-bar" id="progress-bar">
        <div class="progress-track" id="progress-track">
          <div class="progress-fill" id="progress-fill"></div>
          <div class="progress-thumb" id="progress-thumb"></div>
        </div>
        <div class="progress-time">
          <span id="time-current">0:00</span>
          <span id="time-total">0:00</span>
        </div>
      </div>
      <div class="player-controls">
        <button id="btn-mode" class="ctrl-btn mode-btn" title="顺序播放">🔀</button>
        <button id="btn-prev" class="ctrl-btn">⏮</button>
        <button id="btn-play-large" class="ctrl-btn play-btn">▶</button>
        <button id="btn-next" class="ctrl-btn">⏭</button>
        <button id="btn-lyrics-toggle" class="ctrl-btn">📜</button>
      </div>
      <div id="lyrics-container" class="lyrics-container hidden">
        <div id="lyrics-content" class="lyrics-content">加载歌词中...</div>
      </div>
    </div>
  </div>

  <!-- 底部迷你播放条 -->
  <div id="player-bar" class="player-bar hidden">
    <div class="player-bar-click" id="player-bar-click">
      <img id="player-cover" class="cover-mini" src="" alt="">
      <div class="player-info">
        <span id="player-title" class="player-title"></span>
        <span id="player-artist" class="player-artist"></span>
      </div>
    </div>
    <button id="btn-play" class="play-btn-mini">▶</button>
  </div>
</div>

<!-- 添加到歌单弹窗 -->
<div id="modal-overlay" class="modal-overlay hidden">
  <div class="modal">
    <h3>添加到歌单</h3>
    <div id="modal-playlists" class="modal-list"></div>
    <button id="modal-cancel" class="btn-cancel">取消</button>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
